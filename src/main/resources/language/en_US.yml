  help:
    - "{prefix} <yellow>/quests</yellow> <gray>- opens the quest menu.</gray>"
    - "{prefix} <yellow>/quests active</yellow> <gray>- shows active quests.</gray>"
    - "{prefix} <yellow>/quests completed</yellow> <gray>- shows completed quests.</gray>"
